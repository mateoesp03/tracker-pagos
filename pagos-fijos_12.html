<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pagos Fijos</title>
<meta name="theme-color" content="#faf8f4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pagos">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#faf8f4;
    --panel:#ffffff;
    --line:#e8e3d8;
    --text:#2b2620;
    --muted:#8b8375;
    --accent:#2f7d6b;
    --accent-soft:#e4f1ec;
    --danger:#c1594a;
    --warn:#d9a441;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
    padding:20px 16px 100px;
    min-height:100vh;
  }
  .wrap{max-width:520px;margin:0 auto;}
  header{margin-bottom:20px;}
  h1{font-size:24px;font-weight:700;margin:0 0 2px;letter-spacing:-0.02em;}
  .sub{color:var(--muted);font-size:14px;}

  .hero{
    background:linear-gradient(135deg,var(--accent),#1f5f52);
    border-radius:20px;
    padding:24px 22px;
    color:#fff;
    margin-bottom:16px;
    box-shadow:0 8px 24px -8px rgba(47,125,107,0.4);
  }
  .hero .label{font-size:12px;opacity:.8;text-transform:uppercase;letter-spacing:.06em;}
  .hero .amount{font-size:36px;font-weight:700;margin:4px 0 14px;letter-spacing:-0.02em;}
  .hero .stats{display:flex;gap:20px;font-size:13px;}
  .hero .stats b{display:block;font-size:16px;}

  .section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:24px 0 10px;}

  form{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:8px;
    box-shadow:0 2px 8px -4px rgba(0,0,0,0.06);
  }
  form .full{grid-column:1/-1;}
  label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;font-weight:500;}
  input,select{
    background:#fbfaf7;
    border:1px solid var(--line);
    color:var(--text);
    border-radius:10px;
    padding:11px 12px;
    font-size:15px;
    width:100%;
  }
  input:focus,select:focus{outline:none;border-color:var(--accent);}
  button{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:13px 16px;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    grid-column:1/-1;
    transition:transform .1s;
  }
  button:active{transform:scale(0.98);}

  .list{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
  .row{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 1px 4px -2px rgba(0,0,0,0.05);
  }
  .row .left{display:flex;align-items:center;gap:12px;}
  .row .badge{
    width:38px;height:38px;border-radius:10px;
    background:var(--accent-soft);color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:15px;flex-shrink:0;
  }
  .row.urgent-soon{background:linear-gradient(135deg,#fff5f3,#fde3de);border-color:#f3beb3;}
  .row.urgent-mid{background:linear-gradient(135deg,#fffaf0,#fbeed2);border-color:#f0d8a0;}
  .row.urgent-far{background:linear-gradient(135deg,#f3faf6,#dcf0e6);border-color:#a8dcc2;}
  .row .badge.soon{background:var(--danger);color:#fff;}
  .row .badge.mid{background:var(--warn);color:#fff;}
  .row .badge.far{background:var(--accent);color:#fff;}
  .row .info b{font-size:15px;display:block;}
  .row .info .meta{color:var(--muted);font-size:12px;margin-top:2px;}
  .row .right{display:flex;align-items:center;gap:12px;}
  .row .monto{font-weight:700;font-size:15px;white-space:nowrap;}
  .row .del{
    background:none;border:none;color:var(--danger);cursor:pointer;font-size:18px;padding:4px;line-height:1;
  }
  .empty{color:var(--muted);text-align:center;padding:50px 20px;font-size:14px;background:var(--panel);border-radius:16px;border:1px dashed var(--line);}

  #login-screen{
    max-width:360px;margin:15vh auto 0;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:28px 24px;box-shadow:0 2px 8px -4px rgba(0,0,0,0.06);
  }
  #login-screen h2{margin:0 0 4px;font-size:20px;}
  #login-screen .sub{margin-bottom:18px;}
  #login-screen input{margin-bottom:10px;}
  #login-error{color:var(--danger);font-size:13px;margin-top:6px;min-height:16px;}
  #app{display:none;}
  #logout-btn{
    background:none;border:1px solid var(--line);color:var(--muted);
    font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;
    position:absolute;top:20px;right:16px;
  }
</style>
</head>
<body>
<div id="login-screen">
  <h2>Pagos fijos</h2>
  <div class="sub" style="color:var(--muted);font-size:14px;">Inicia sesión para continuar</div>
  <form id="login-form" style="display:block;">
    <input type="email" id="login-email" placeholder="Correo" required>
    <div style="position:relative;">
      <input type="password" id="login-password" placeholder="Contraseña" required style="padding-right:44px;">
      <button type="button" id="toggle-password" style="position:absolute;right:4px;top:4px;bottom:4px;width:36px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;">👁</button>
    </div>
    <button type="submit" style="width:100%;">Entrar</button>
    <div id="login-error"></div>
  </form>
</div>

<div id="app">
<button id="logout-btn">Salir</button>
<div class="wrap">
  <header>
    <h1>Pagos fijos</h1>
    <div class="sub">Tus gastos recurrentes, bajo control</div>
  </header>

  <div class="hero">
    <div class="label">Total mensual</div>
    <div class="amount" style="display:flex;align-items:baseline;gap:10px;">
      <span id="total-pen">S/ 0.00</span>
      <span style="opacity:.5;font-size:24px;">/</span>
      <span id="total-usd">US$ 0.00</span>
    </div>
    <div class="stats">
      <div><b id="count">0</b>pagos activos</div>
      <div><b id="next">—</b>próximo cobro</div>
    </div>
  </div>

  <div class="section-title">Agregar pago</div>
  <form id="form">
    <div class="full">
      <label>Nombre</label>
      <input type="text" id="nombre" placeholder="Netflix, gimnasio, arriendo..." required>
    </div>
    <div>
      <label>Monto</label>
      <input type="number" id="monto" placeholder="0.00" step="0.01" required>
    </div>
    <div>
      <label>Moneda</label>
      <select id="moneda">
        <option value="PEN">Soles (S/)</option>
        <option value="USD">Dólares ($)</option>
      </select>
    </div>
    <div>
      <label>Día de cobro</label>
      <input type="number" id="dia" placeholder="1-31" min="1" max="31" required>
    </div>
    <div class="full">
      <label>Categoría</label>
      <input type="text" id="categoria" placeholder="Suscripciones, vivienda, transporte...">
    </div>
    <button type="submit" id="submit-btn">+ Agregar pago</button>
    <button type="button" id="cancel-edit" style="display:none;background:none;border:1px solid var(--line);color:var(--muted);">Cancelar edición</button>
  </form>

  <div class="section-title">Tus pagos</div>
  <div class="list" id="list"></div>
</div>
</div>

<script>
const SUPABASE_URL = "https://ygmdziiedrklsjkemvag.supabase.co";
const SUPABASE_KEY = "sb_publishable_RSt-iyDfB0FiiDgRT6vTZw_rWyh9bIX";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const loginScreen = document.getElementById('login-screen');
const appScreen = document.getElementById('app');
const loginForm = document.getElementById('login-form');
const loginError = document.getElementById('login-error');
const logoutBtn = document.getElementById('logout-btn');
const togglePassword = document.getElementById('toggle-password');

togglePassword.addEventListener('click', () => {
  const pwInput = document.getElementById('login-password');
  pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
});

async function checkSession(){
  const { data: { session } } = await client.auth.getSession();
  if(session){
    loginScreen.style.display = 'none';
    appScreen.style.display = 'block';
    loadPayments();
  } else {
    loginScreen.style.display = 'block';
    appScreen.style.display = 'none';
  }
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginError.textContent = '';
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const { error } = await client.auth.signInWithPassword({ email, password });
  if(error){
    loginError.textContent = 'Correo o contraseña incorrectos';
    return;
  }
  checkSession();
});

logoutBtn.addEventListener('click', async () => {
  await client.auth.signOut();
  checkSession();
});

checkSession();

const form = document.getElementById('form');
const list = document.getElementById('list');
const totalPenEl = document.getElementById('total-pen');
const totalUsdEl = document.getElementById('total-usd');
const countEl = document.getElementById('count');
const nextEl = document.getElementById('next');
const submitBtn = document.getElementById('submit-btn');
const cancelEditBtn = document.getElementById('cancel-edit');
let editingId = null;

async function loadPayments(){
  const { data, error } = await client
    .from('fixed_payments')
    .select('*')
    .eq('activo', true)
    .order('dia_cobro', { ascending: true });

  if(error){
    list.innerHTML = `<div class="empty">Error: ${error.message}</div>`;
    return;
  }
  render(data);
}

function render(payments){
  if(!payments.length){
    list.innerHTML = '<div class="empty">Aún no tienes pagos fijos.<br>Agrega el primero arriba.</div>';
    totalPenEl.textContent = 'S/ 0.00';
    totalUsdEl.textContent = 'US$ 0.00';
    countEl.textContent = '0';
    nextEl.textContent = '—';
    return;
  }

  const totalPEN = payments.filter(p => (p.moneda || 'PEN') === 'PEN').reduce((s,p) => s + Number(p.monto), 0);
  const totalUSD = payments.filter(p => p.moneda === 'USD').reduce((s,p) => s + Number(p.monto), 0);
  totalPenEl.textContent = `S/ ${totalPEN.toFixed(2)}`;
  totalUsdEl.textContent = `US$ ${totalUSD.toFixed(2)}`;
  countEl.textContent = payments.length;

  const today = new Date().getDate();
  const withDiff = payments.map(p => ({...p, diff: p.dia_cobro >= today ? p.dia_cobro - today : p.dia_cobro - today + 31}));
  const upcoming = withDiff.sort((a,b) => a.diff - b.diff)[0];
  nextEl.textContent = upcoming ? `${upcoming.nombre}` : '—';

  list.innerHTML = withDiff
    .sort((a,b) => a.diff - b.diff)
    .map(p => {
      const level = p.diff <= 5 ? 'soon' : p.diff <= 15 ? 'mid' : 'far';
      return `
    <div class="row urgent-${level}">
      <div class="left">
        <div class="badge ${level}">${p.dia_cobro}</div>
        <div class="info">
          <b>${p.nombre}</b>
          <div class="meta">${p.categoria || 'Sin categoría'} · en ${p.diff} día${p.diff===1?'':'s'}</div>
        </div>
      </div>
      <div class="right">
        <span class="monto">${p.moneda === 'USD' ? 'US$' : 'S/'} ${Number(p.monto).toFixed(2)}</span>
        <button class="edit" data-id="${p.id}" data-nombre="${p.nombre}" data-monto="${p.monto}" data-moneda="${p.moneda || 'PEN'}" data-dia="${p.dia_cobro}" data-categoria="${p.categoria || ''}" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;">✎</button>
        <button class="del" data-id="${p.id}">✕</button>
      </div>
    </div>
  `;
    }).join('');

  document.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', async () => {
      await client.from('fixed_payments').delete().eq('id', btn.dataset.id);
      loadPayments();
    });
  });

  document.querySelectorAll('.edit').forEach(btn => {
    btn.addEventListener('click', () => {
      editingId = btn.dataset.id;
      document.getElementById('nombre').value = btn.dataset.nombre;
      document.getElementById('monto').value = btn.dataset.monto;
      document.getElementById('moneda').value = btn.dataset.moneda;
      document.getElementById('dia').value = btn.dataset.dia;
      document.getElementById('categoria').value = btn.dataset.categoria;
      submitBtn.textContent = 'Guardar cambios';
      cancelEditBtn.style.display = 'block';
      window.scrollTo({top:0, behavior:'smooth'});
    });
  });
}

cancelEditBtn.addEventListener('click', () => {
  editingId = null;
  form.reset();
  submitBtn.textContent = '+ Agregar pago';
  cancelEditBtn.style.display = 'none';
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const nombre = document.getElementById('nombre').value.trim();
  const monto = parseFloat(document.getElementById('monto').value);
  const moneda = document.getElementById('moneda').value;
  const dia_cobro = parseInt(document.getElementById('dia').value);
  const categoria = document.getElementById('categoria').value.trim();

  let error;
  if(editingId){
    ({ error } = await client.from('fixed_payments').update({ nombre, monto, moneda, dia_cobro, categoria }).eq('id', editingId));
  } else {
    ({ error } = await client.from('fixed_payments').insert([{ nombre, monto, moneda, dia_cobro, categoria }]));
  }

  if(error){
    alert('Error al guardar: ' + error.message);
    return;
  }
  editingId = null;
  submitBtn.textContent = '+ Agregar pago';
  cancelEditBtn.style.display = 'none';
  form.reset();
  loadPayments();
});
</script>
</body>
</html>
